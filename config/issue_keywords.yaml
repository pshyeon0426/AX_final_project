# VOC 이슈 유형 키워드 사전 (issue_keywords.yaml)
# - MVP 단계: ML 이 아니라 '룰(키워드) 기반' 분류에 사용한다.
# - 한 리뷰가 여러 유형에 매칭될 수 있다(list 반환).
# - 키워드는 clean_text(소문자/공백정리) 기준 부분 문자열 매칭으로 사용한다.
# - 운영 중 오탐/누락이 발견되면 이 파일만 수정하면 된다(코드 변경 불필요).

