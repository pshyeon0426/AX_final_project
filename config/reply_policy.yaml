# ============================================================
# 리뷰 답글 생성 정책 (reply_policy.yaml)
# ------------------------------------------------------------
# ⚠️ 이 정책으로 생성되는 답글은 '자동 게시'가 아니라
#    **담당자 검수 후 복사/활용하는 초안**입니다.
# - 톤/금지원칙/유형별 가이드/고객센터 안내 문구를 한 곳에서 관리한다.
# - 실제 고객정보/내부 비공개 데이터/계정정보/키는 절대 포함하지 않는다.
# - 운영 중 정책 변경 시 코드 수정 없이 이 파일만 갱신한다.
# ============================================================

meta:
  is_auto_post: false          # 자동 게시 금지 (항상 false)
  purpose: "담당자 검수용 답글 초안 생성"
  language: ko

# 운영자 기본 LLM 지침 (UI 답글 생성 시 입력칸 기본값으로 채워짐. 비워도 됨)
# 예: "현재 신규 적금 이벤트 진행 중임을 자연스럽게 안내", "앱 점검 일정은 언급하지 말 것"
# ⚠️ 금지 원칙과 충돌하면 금지 원칙이 우선합니다.
default_llm_guidance: ""

# ------------------------------------------------------------
# 기본 톤
# ------------------------------------------------------------
tone:
  style: "공손하고 간결한 존댓말"
  sentences_min: 2
  sentences_max: 4
  max_chars: 300
  persona: "슈퍼SOL 고객지원팀"

# ------------------------------------------------------------
# 답글 유형 (reply_type)
# - 각 유형별 의도와 작성 가이드. severity/sentiment 와 매핑해 선택한다.
# ------------------------------------------------------------
reply_types:
  thanks_positive:
    intent: "긍정 리뷰에 감사 표현"
    guide: "감사 인사 + 지속적인 개선 의지. 과장된 약속은 하지 않는다."
    needs_human_review: false

  apology_and_guidance:
    intent: "불편/오류 사과 및 해결 방향 안내"
    guide: "불편에 공감·사과 + 일반적 해결 경로 안내. 원인 단정/보상 약속 금지."
    needs_human_review: false

  feature_request_ack:
    intent: "기능 요청/개선 제안 접수 확인"
    guide: "의견 감사 + 검토 의사 전달. 도입 확정 약속은 하지 않는다."
    needs_human_review: false

  how_to_guidance:
    intent: "사용 방법 문의에 대한 안내"
    guide: "일반적인 사용 경로를 단계적으로 안내. 고객별 계좌/거래 추정 금지."
    needs_human_review: false

  security_sensitive:
    intent: "보안/금전/심각 오류 등 민감 이슈 대응"
    guide: >
      사과·공감 후 개인정보 입력을 요구하지 않고 공식 채널(고객센터/앱 내 문의)로
      안내. 처리 결과·원인 단정 금지. 반드시 담당자 검수 필요.
    needs_human_review: true

  fallback_general:
    intent: "유형 판단이 어려운 경우 일반 응대"
    guide: "정중한 감사/접수 표현 + 공식 채널 안내. 구체적 약속은 하지 않는다."
    needs_human_review: false

# ------------------------------------------------------------
# 금지 원칙 (모든 유형 공통, 위반 시 답글 폐기/재작성)
# ------------------------------------------------------------
prohibited_principles:
  - id: no_personal_info_request
    rule: "개인정보·계좌번호·비밀번호·인증번호 입력을 요청하지 않는다."
  - id: no_promises
    rule: "보상·장애 원인·처리 결과를 확정적으로 약속하지 않는다."
  - id: no_account_knowledge
    rule: "고객별 계좌/거래 내역을 알고 있는 것처럼 표현하지 않는다."
  - id: no_investment_advice
    rule: "금융상품 투자 조언이나 확정적 추천을 하지 않는다."
  - id: no_competitor_bashing
    rule: "경쟁사를 비방하지 않는다."

# 답글에 등장하면 안 되는 표현(금칙어) — 후처리 필터에서도 사용
# 주의: '비밀번호/인증번호' 같은 명사는 "공유하지 마세요" 안전 경고에서는 정상이므로
#       금칙어로 두지 않는다. 실제 위험인 '입력/제공 요청' 맥락은
#       safety_check_reply 의 personal_info_request 정규식이 탐지한다.
banned_phrases:
  - 보상해
  - 환불해드리
  - 무조건
  - 100%
  - 반드시 해결
  - 확실히 보상

# ------------------------------------------------------------
# 검수 필요(needs_human_review=True) 강제 조건
# - 아래에 해당하면 유형과 무관하게 검수 플래그를 켠다.
# ------------------------------------------------------------
force_human_review:
  severities: [high]
  issue_types: [보안, 송금, 오류]
  keywords:
    - 해킹
    - 유출
    - 명의도용
    - 사기
    - 피싱
    - 이체실패
    - 송금실패
    - 결제실패
    - 출금
    - 돈이
    - 개인정보

# ------------------------------------------------------------
# 심각 이슈 안내 문구 (실제 채널/번호는 운영팀 확인 후 교체)
# ------------------------------------------------------------
contact_guidance:
  default: "자세한 확인이 필요하시면 앱 내 [고객센터] 또는 공식 문의 채널로 연락 부탁드립니다."
  security: "계정 보안이 우려되는 경우 즉시 앱 내 [고객센터]를 통해 문의해 주시기 바랍니다. 어떠한 경우에도 비밀번호·인증번호 등은 공유하지 마세요."

# ------------------------------------------------------------
# severity → 권장 답글 유형 매핑 (생성 로직 가이드)
# ------------------------------------------------------------
severity_to_reply_type:
  positive: thanks_positive
  high: security_sensitive      # high 는 민감 처리 + 검수 필수
  medium: apology_and_guidance
  low: how_to_guidance
